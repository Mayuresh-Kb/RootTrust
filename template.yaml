  # ========================================
  # SNS Topic for Cost Alerts
  # ========================================
  CostAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "RootTrust-Cost-Alerts-${Stage}"
      DisplayName: RootTrust Cost Monitoring Alerts
      Subscription:
        - Endpoint: !Ref SenderEmail
          Protocol: email

  # ========================================
  # AWS Budgets Alerts (Multiple Thresholds)
  # ========================================

  # Budget Alert 1: Warning at $100
  RootTrustBudgetWarning:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "RootTrust-Budget-Warning-${Stage}"
        BudgetLimit:
          Amount: 100
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: ABSOLUTE_VALUE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref SenderEmail

  # Budget Alert 2: Critical at $200
  RootTrustBudgetCritical:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "RootTrust-Budget-Critical-${Stage}"
        BudgetLimit:
          Amount: 200
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: ABSOLUTE_VALUE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref SenderEmail

  # Budget Alert 3: Maximum at $280
  RootTrustBudgetMaximum:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "RootTrust-Budget-Maximum-${Stage}"
        BudgetLimit:
          Amount: 280
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: ABSOLUTE_VALUE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref SenderEmail

  # Main Budget with 80% and 90% Thresholds
  RootTrustBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "RootTrust-Monthly-Budget-${Stage}"
        BudgetLimit:
          Amount: !Ref MonthlyBudgetLimit
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref SenderEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 90
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref SenderEmail

  # ========================================
  # IAM Roles and Policies
  # ========================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "RootTrust-Lambda-Execution-${Stage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt RootTrustDataTable.Arn
                  - !Sub "${RootTrustDataTable.Arn}/index/*"
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RootTrustAssetsBucket.Arn
                  - !Sub "${RootTrustAssetsBucket.Arn}/*"
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref JWTSecret
                  - !Ref APIKeysSecret
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
        - PolicyName: SESAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: DynamoDBStreamsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !GetAtt RootTrustDataTable.StreamArn

# ========================================
# Outputs
# ========================================
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${RootTrustApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref RootTrustDataTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  S3BucketName:
    Description: S3 bucket name for assets
    Value: !Ref RootTrustAssetsBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  JWTSecretArn:
    Description: ARN of JWT secret in Secrets Manager
    Value: !Ref JWTSecret
    Export:
      Name: !Sub "${AWS::StackName}-JWTSecretArn"

  APIKeysSecretArn:
    Description: ARN of API keys secret in Secrets Manager
    Value: !Ref APIKeysSecret
    Export:
      Name: !Sub "${AWS::StackName}-APIKeysSecretArn"

  LambdaExecutionRoleArn:
    Description: ARN of Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaRoleArn"
