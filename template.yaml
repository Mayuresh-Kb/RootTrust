AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: RootTrust Marketplace - AI-powered serverless marketplace platform

# Global configuration for all Lambda functions
Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        TABLE_NAME: !Ref RootTrustDataTable
        BUCKET_NAME: !Ref RootTrustAssetsBucket
        JWT_SECRET_ARN: !Ref JWTSecret
        BEDROCK_REGION: !Ref AWS::Region
        STAGE: !Ref Stage
        SENDER_EMAIL: !Ref SenderEmail
        ENABLE_EMAIL_VERIFICATION: "false"
    Tracing: Active
  Api:
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      MaxAge: "'3600'"
    TracingEnabled: true

# Parameters for environment-specific configuration
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment stage (dev or prod)

  MonthlyBudgetLimit:
    Type: Number
    Default: 300
    Description: Monthly AWS budget limit in USD

  BudgetAlertThreshold:
    Type: Number
    Default: 80
    Description: Budget alert threshold percentage (default 80%)

  SenderEmail:
    Type: String
    Default: noreply@roottrust.com
    Description: Email address for sending system notifications (must be verified in SES)

Resources:
  # ========================================
  # DynamoDB Table - Single-Table Design
  # ========================================
  RootTrustDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "RootTrustData-${Stage}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        # Primary Key
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        # GSI1 - Category and Seasonal Queries
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        # GSI2 - Farmer/Consumer Lookups
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        # GSI3 - Time-based Queries
        - AttributeName: GSI3PK
          AttributeType: S
        - AttributeName: GSI3SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1: Category/Seasonal queries (e.g., CATEGORY#vegetables)
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI2: Farmer/Consumer lookups (e.g., FARMER#userId, CONSUMER#userId)
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI3: Time-based queries (e.g., STATUS#active, RELEASE#endDate)
        - IndexName: GSI3
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
            - AttributeName: GSI3SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: RootTrust
        - Key: Stage
          Value: !Ref Stage

  # ========================================
  # S3 Bucket for Assets
  # ========================================
  RootTrustAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "roottrust-assets-${Stage}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - "*"
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          # Transition product images to Standard-IA after 30 days
          - Id: TransitionToStandardIA
            Status: Enabled
            Prefix: "products/"
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
          # Delete temporary uploads after 1 day
          - Id: DeleteTempUploads
            Status: Enabled
            Prefix: "temp-uploads/"
            ExpirationInDays: 1
      Tags:
        - Key: Project
          Value: RootTrust
        - Key: Stage
          Value: !Ref Stage

  # S3 Bucket Policy for Lambda access
  RootTrustAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RootTrustAssetsBucket
      PolicyDocument:
        Statement:
          - Sid: AllowLambdaAccess
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "${RootTrustAssetsBucket.Arn}/*"

  # ========================================
  # API Gateway
  # ========================================
  RootTrustApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "RootTrustAPI-${Stage}"
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: JWTAuthorizer
        Authorizers:
          JWTAuthorizer:
            FunctionArn: !GetAtt JWTAuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              Headers:
                - Authorization
      # Cache Configuration (DISABLED by default for cost optimization)
      # Cost: $0.02/hour = $14.40/month for 0.5GB cache
      # Enable only when traffic increases (>10,000 requests/day)
      # See COST_OPTIMIZATION.md and API_GATEWAY_CACHING.md for details
      CacheClusterEnabled: false
      CacheClusterSize: "0.5" # 0.5GB cache (smallest size)
      MethodSettings:
        # Default settings for all endpoints
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 500
          ThrottlingRateLimit: 100
          # LoggingLevel: INFO  # Disabled - requires CloudWatch Logs role in account settings
          # DataTraceEnabled: true  # Disabled - requires CloudWatch Logs role
          MetricsEnabled: true
          CachingEnabled: false
          CacheDataEncrypted: true
        # GET /products - Product listing endpoint
        # Cache for 5 minutes (300 seconds) when caching is enabled
        # Cache key includes: query parameters (category, seasonal, giTag, search)
        - ResourcePath: "/products"
          HttpMethod: "GET"
          ThrottlingBurstLimit: 500
          ThrottlingRateLimit: 100
          CachingEnabled: false # Set to true when CacheClusterEnabled is true
          CacheTtlInSeconds: 300 # 5 minutes
          CacheDataEncrypted: true
          # Cache key parameters are automatically included from query strings
        # GET /products/{productId} - Product detail endpoint
        # Cache for 1 hour (3600 seconds) when caching is enabled
        # Cache key includes: productId path parameter
        - ResourcePath: "/products/*"
          HttpMethod: "GET"
          ThrottlingBurstLimit: 500
          ThrottlingRateLimit: 100
          CachingEnabled: false # Set to true when CacheClusterEnabled is true
          CacheTtlInSeconds: 3600 # 1 hour
          CacheDataEncrypted: true
      Tags:
        Project: RootTrust
        Stage: !Ref Stage

  # ========================================
  # Secrets Manager
  # ========================================
  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "RootTrust-JWT-Secret-${Stage}"
      Description: JWT signing secret for RootTrust authentication
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: "secret"
        PasswordLength: 64
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Project
          Value: RootTrust
        - Key: Stage
          Value: !Ref Stage

  APIKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "RootTrust-API-Keys-${Stage}"
      Description: API keys for external services (Razorpay, Stripe, etc.)
      SecretString: !Sub |
        {
          "razorpay_key_id": "PLACEHOLDER",
          "razorpay_key_secret": "PLACEHOLDER",
          "stripe_api_key": "PLACEHOLDER",
          "stripe_webhook_secret": "PLACEHOLDER"
        }
      Tags:
        - Key: Project
          Value: RootTrust
        - Key: Stage
          Value: !Ref Stage

  # ========================================
  # Lambda Functions
  # ========================================

  # JWT Authorizer Function
  JWTAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-JWTAuthorizer-${Stage}"
      CodeUri: backend/auth/
      Handler: authorizer.handler
      Description: JWT token validation authorizer
      Environment:
        Variables:
          JWT_SECRET_ARN: !Ref JWTSecret
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref JWTSecret

  # Authentication Service Functions
  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Auth-Register-${Stage}"
      CodeUri: backend/auth/
      Handler: register.handler
      Description: User registration endpoint
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
      Events:
        RegisterApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE

  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Auth-Login-${Stage}"
      CodeUri: backend/auth/
      Handler: login.handler
      Description: User login endpoint
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE

  # Product Service Functions
  ProductCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Product-Create-${Stage}"
      CodeUri: backend/products/
      Handler: create_product.handler
      Description: Product creation endpoint for farmers
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          BUCKET_NAME: !Ref RootTrustAssetsBucket
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - S3CrudPolicy:
            BucketName: !Ref RootTrustAssetsBucket
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        CreateProductApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /products
            Method: POST

  ProductListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Product-List-${Stage}"
      CodeUri: backend/products/
      Handler: list_products.handler
      Description: Product listing endpoint with filters and pagination
      Timeout: 5
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RootTrustDataTable
      Events:
        ListProductsApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /products
            Method: GET
            Auth:
              Authorizer: NONE

  ProductDetailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Product-Detail-${Stage}"
      CodeUri: backend/products/
      Handler: get_product_detail.handler
      Description: Product detail endpoint with farmer profile and reviews
      Timeout: 5
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
      Events:
        GetProductDetailApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /products/{productId}
            Method: GET
            Auth:
              Authorizer: NONE

  ProductUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Product-Update-${Stage}"
      CodeUri: backend/products/
      Handler: update_product.handler
      Description: Product update endpoint for farmers to update their products
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        UpdateProductApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /products/{productId}
            Method: PUT

  ProductImageUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Product-ImageUpload-${Stage}"
      CodeUri: backend/products/
      Handler: update_product_images.handler
      Description: Product image upload handler to update product with image URLs
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        UpdateProductImagesApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /products/{productId}/images
            Method: POST

  # AI Verification Service Functions
  AIVerifyProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-AI-VerifyProduct-${Stage}"
      CodeUri: backend/ai/
      Handler: verify_product.handler
      Description: AI-powered fraud detection using Amazon Bedrock
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          BEDROCK_REGION: !Ref AWS::Region
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        VerifyProductApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /ai/verify-product
            Method: POST

  AIVerificationStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-AI-VerificationStatus-${Stage}"
      CodeUri: backend/ai/
      Handler: verification_status.handler
      Description: Retrieve product verification status and scores
      Timeout: 5
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        VerificationStatusApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /ai/verification-status/{productId}
            Method: GET

  # AI Marketing Service Functions
  AIGenerateDescriptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-AI-GenerateDescription-${Stage}"
      CodeUri: backend/ai/
      Handler: generate_description.handler
      Description: AI-powered product description generation using Amazon Bedrock
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          BEDROCK_REGION: !Ref AWS::Region
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        GenerateDescriptionApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /ai/generate-description
            Method: POST

  AIGenerateNamesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-AI-GenerateNames-${Stage}"
      CodeUri: backend/ai/
      Handler: generate_names.handler
      Description: AI-powered product name suggestion using Amazon Bedrock
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          BEDROCK_REGION: !Ref AWS::Region
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        GenerateNamesApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /ai/generate-names
            Method: POST

  AIEnhanceDescriptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-AI-EnhanceDescription-${Stage}"
      CodeUri: backend/ai/
      Handler: enhance_description.handler
      Description: AI-powered description enhancement using Amazon Bedrock
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          BEDROCK_REGION: !Ref AWS::Region
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        EnhanceDescriptionApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /ai/enhance-description
            Method: POST

  AIGenerateSocialFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-AI-GenerateSocial-${Stage}"
      CodeUri: backend/ai/
      Handler: generate_social.handler
      Description: AI-powered social media content generation with seasonal urgency
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          BEDROCK_REGION: !Ref AWS::Region
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        GenerateSocialApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /ai/generate-social
            Method: POST

  AIGenerateLaunchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-AI-GenerateLaunch-${Stage}"
      CodeUri: backend/ai/
      Handler: generate_launch.handler
      Description: AI-powered launch announcement generation for new products
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          BEDROCK_REGION: !Ref AWS::Region
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        GenerateLaunchApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /ai/generate-launch
            Method: POST

  # Order Service Functions
  OrderCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Order-Create-${Stage}"
      CodeUri: backend/orders/
      Handler: create_order.handler
      Description: Order creation endpoint for consumers to purchase products
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        CreateOrderApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /orders
            Method: POST

  OrderListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Order-List-${Stage}"
      CodeUri: backend/orders/
      Handler: list_orders.handler
      Description: Order listing endpoint for consumers and farmers to view their orders
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        ListOrdersApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /orders
            Method: GET

  OrderDetailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Order-Detail-${Stage}"
      CodeUri: backend/orders/
      Handler: get_order_detail.handler
      Description: Order detail endpoint for consumers and farmers to view complete order details
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RootTrustDataTable
          JWT_SECRET_KEY: !Sub "{{resolve:secretsmanager:RootTrust-JWT-Secret-${Stage}:SecretString:secret}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RootTrustDataTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:RootTrust-JWT-Secret-${Stage}-*"
      Events:
        GetOrderDetailApi:
          Type: Api
          Properties:
            RestApiId: !Ref RootTrustApi
            Path: /orders/{orderId}
            Method: GET

  OrderStatusUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RootTrust-Order-StatusUpdate-${Stage}"
